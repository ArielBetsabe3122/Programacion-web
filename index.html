<head>
    <meta charset="UTF-8">

    <title>Menu </title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .grid-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: #f1f2f6;
            color: #2980b9;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            border-left: 5px solid #2980b9;
            transition: all 0.2s ease;
        }
        .menu-item:hover {
            background: #e4e7eb;
            color: #21618c;
            transform: translateX(4px);
        }
        .icon {
            margin-right: 15px;
            font-size: 1.2rem;
        }
    </style>
</head>
