<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/ejercicio12.css">
    <script src="js/ejercicio12.js"></script>
    <title>Conversor de Moneda</title>
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Convertidor de $ Mexicanos a USD </h1>
        <form class="formulario">
            <div class="formulario-entrada">
                <label for="numero">$MXN:</label>
                <input type="number" id="numero" min="0" placeholder="Ej:22" required>
            </div>
            <button type="button" class="boton-convertir" onclick="convertir()">Convertir</button>
            <div class="formulario-entrada">
                <label for="resultado">$USD: </label>
                <input type="text" id="resultado" placeholder="Resultado" readonly>
            </div>
        </form>
    </div>
</body>
