<!DOCTYPE html>
<html lang="es">+
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulación del DOM </title>
    <link rel="stylesheet" href="css/ejercicio19.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center min-vh-100 p-3">
    <div class="card p-4 shadow-sm" style="max-width: 500px; width: 100%; border-radius: 12px;">
        
        <h1 class="fs-3 fw-bold text-center mb-1">Agregar y Eliminar Elementos</h1>
        <p class="text-muted text-center small mb-4">Escribe un elemento para construir tu lista .</p>

        <form onsubmit="event.preventDefault();">
            <div class="mb-3">
                <label for="nuevoElemento" class="form-label fw-semibold">Nuevo Elemento:</label>
                <input type="text" class="form-control" id="nuevoElemento" placeholder="Escribe algo" required>
            </div>

            <button type="button" id="agregarBtn" class="btn-agregar w-100 py-2 fw-semibold mb-4">
                Agregar Elemento
            </button>

            <div class="mb-2">
                <label class="form-label fw-semibold">Elementos Agregados:</label>
                <ul id="lista" class="list-group">
                    </ul>
            </div>
        </form>

    </div>
    <script src="js/ejercicio19.js"></script>
</body>
</html>
