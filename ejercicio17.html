<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas | DevSolutions</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/ejercicio17.css">
</head>
<body>

    <div class="container min-vh-100 d-flex justify-content-center align-items-center">
        <div class="card p-4 shadow-sm" style="max-width: 550px; width: 100%; border-radius: 16px;">
            
            <h1 class="fs-3 fw-bold text-center mb-1">Gestión de Tareas</h1>
            <p class="text-muted text-center small mb-4">Organiza pendientes. Los datos estaran en el navegador.</p>

            <form id="formTareas" onsubmit="event.preventDefault();">
                
                <div class="">
                    <label for="nuevaTareaInput" class="form-label fw-semibold">Nueva Tarea</label>
                    <input type="text" class="form-control" id="nuevaTarea" placeholder="Ej: Estudiar para el examen" required>
                    <span class="error-mensaje" id="errorTarea"></span>
                </div>

                <button type="button" id="btnAgregarTarea" class="btn-agregar w-100 py-2 fw-semibold mb-4">
                    Agregar Tarea &rarr;
                </button>

                <div class="mb-2">
                    <label class="form-label fw-semibold">Mis Pendientes</label>
                    <ul id="listaTareas" class="list-group">
                        </ul>
                </div>
            </form>

        </div>
    </div>
    <script src="js/ejercicio17.js"></script>
</body>
</html>
