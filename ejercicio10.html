<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/ejercicio10.css">
    <script src="js/ejercicio10.js"></script>
    <title>Calculadora</title>
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Convertidor de Celsius a Fahrenheit </h1>
        <form class="formulario">
            <div class="formulario-entrada">
                <label for="numero">Temperatura en ° Celsius.</label>
                <input type="number" id="numero" placeholder="Ej:22" required>
            </div>
            <button type="button" class="boton-convertir" onclick="convertir()">Convertir</button>
            <div class="formulario-entrada">
                <label for="resultado">Temperatura en ° Fahrenheit: </label>
                <input type="text" id="resultado" placeholder="Resultado" readonly>
            </div>
        </form>
    </div>
</body>
