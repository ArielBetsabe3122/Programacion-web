<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/ejercicio13.css">
    <script src="js/ejercicio13.js"></script>
    <title>Verificador de Votación</title>
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Verificador de Elegibilidad para Votar</h1>
        <form class="formulario">
            <div class="formulario-entrada">
                <label for="edad">Ingresa tu Edad:</label>
                <input type="number" id="edad" min="0" placeholder="Ej: 18" required>
            </div>
            
            <button type="button" class="boton-verificar" onclick="verificar()">Verificar</button>
            
            <div class="formulario-entrada">
                <label for="resultado">Eres elegible: </label>
                <input type="text" id="resultado" placeholder="Resultado" readonly>
            </div>
        </form>
    </div>
</body>
</html>
